<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Patient Desk Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #2563eb;
            --danger: #dc2626;
            --bg-color: #cbd5e1;       
            --surface: #f1f5f9;        
            --input-bg: #ffffff;       
            --text-main: #0f172a;      
            --text-muted: #475569;
            --border: #64748b;         
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.15);
        }

        [data-theme="dark"] {
            --primary: #3b82f6;
            --secondary: #60a5fa;
            --danger: #f87171;
            --bg-color: #0f172a;       
            --surface: #1e293b;        
            --input-bg: #0f172a;       
            --text-main: #f8fafc;      
            --text-muted: #94a3b8;
            --border: #475569;         
            --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px 10px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            padding: 20px;
            border: 2px solid var(--border);
            border-top: 8px solid var(--primary);
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--primary);
            border-bottom: 2px solid var(--border);
            padding-bottom: 6px;
            margin-top: 25px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 15px;
            width: 100%;
        }
        
        .form-row, .grid-2x2 {
            display: flex;
            flex-direction: column; 
            gap: 12px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            background-color: var(--input-bg);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 1rem; 
            outline: none;
        }

        textarea {
            resize: none;
            overflow-y: hidden;
            min-height: 90px;
            line-height: 1.5;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--secondary);
        }

        .dynamic-item {
            background: rgba(37, 99, 235, 0.15);
            border: 2px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dosage-container {
            background: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border: 2px solid var(--border);
        }

        .meal-timing { margin-bottom: 15px; }
        .meal-timing:last-child { margin-bottom: 0; }

        .meal-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .dosage-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .dosage-box text-align: center;
        .dosage-box span { font-size: 0.75rem; color: var(--text-main); font-weight: 600; display: block; margin-bottom: 3px; }
        .dosage-box input { text-align: center; padding: 8px; }

        .toggle-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .toggle-row label {
            background: rgba(100, 116, 139, 0.3);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .toggle-row input[type="radio"] { display: none; }
        .toggle-row input[type="radio"]:checked + label {
            background: var(--primary);
            color: #fff;
        }

        button {
            cursor: pointer;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: rgba(100, 116, 139, 0.2); color: var(--text-main); border: 1px solid var(--border); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

        .search-section {
            background: rgba(100, 116, 139, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid var(--border);
        }

        .chart-box {
            background: var(--surface);
            border: 2px solid var(--border);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .visit-card {
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
        }

        .visit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 6px;
        }

        .print-horizontal-metrics { display: none; }

        @media min-width: 768px {
            .form-row { flex-direction: row; }
            .grid-2x2 { grid-template-columns: repeat(2, 1fr); flex-direction: row; }
        }

        /* ------------------------------------------------------------- */
        /* ROBUST PRINT ROUTINE FIX                                      */
        /* ------------------------------------------------------------- */
        @media print {
            @page { size: A4 portrait; margin: 15mm; }
            body { background: #ffffff !important; color: #000000 !important; padding: 0; font-size: 11pt; }
            .container { box-shadow: none !important; border: none !important; padding: 0 !important; max-width: 100% !important; background: #ffffff !important; }
            
            /* Clean up UI clutter on hard print */
            .search-section, form, button, .section-title, .chart-box, .header-bar, .visit-header button { display: none !important; }
            
            #historySection { display: block !important; }
            .visit-card { border: none !important; border-bottom: 2px solid #000000 !important; padding: 15px 0 !important; page-break-inside: avoid; background: #ffffff !important; }
            
            /* Render data elements side-by-side horizontally */
            .print-horizontal-metrics {
                display: flex !important;
                flex-direction: row !important;
                justify-content: space-between !important;
                gap: 15px !important;
                margin-bottom: 12px !important;
                border-bottom: 1px solid #ccc !important;
                padding-bottom: 6px !important;
            }
            .print-horizontal-metrics span { flex: 1; font-size: 11pt; color: #000000 !important; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-bar">
            <h2>Clinical Patient Desk</h2>
            <button class="btn-secondary" onclick="toggleTheme()">🌓 Light/Dark Mode</button>
        </div>
        
        <div class="search-section">
            <label for="searchPatient">🔍 Search Profile (Type Patient ID or Name)</label>
            <div class="form-row">
                <div class="form-group">
                    <input type="text" id="searchPatient" list="pastPatients" placeholder="Search criteria...">
                    <datalist id="pastPatients"></datalist>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 10px;">
                    <button type="button" class="btn-secondary" onclick="resetFormToNew()">Clear</button>
                    <button type="button" class="btn-primary" id="printBtn" style="display:none;" onclick="triggerNativePrint()">🖨️ Print Record</button>
                    <button type="button" class="btn-danger" id="deletePatientBtn" style="display:none;" onclick="deleteEntirePatient()">Delete Profile</button>
                </div>
            </div>
        </div>

        <div id="analyticsSection" class="chart-box" style="display:none;">
            <label>📊 Diagnostic Test Tracker (Timeline Analytics Graph)</label>
            <select id="chartTestSelector" style="margin-bottom:15px;" onchange="updateAnalyticsChart()">
            </select>
            <div style="position: relative; height:240px; width:100%;">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>

        <div id="historySection" style="display: none; margin-bottom: 30px;">
            <div class="section-title">Patient Medical Records Summary</div>
            <div id="visitTimeline"></div>
        </div>

        <div class="section-title" id="formHeader">New Visit Entry</div>
        <form id="clinicalForm" onsubmit="savePatientRecord(event)">
            <input type="hidden" id="editVisitIndex" value="">

            <div class="form-row">
                <div class="form-group">
                    <label for="patientId">Patient ID *</label>
                    <input type="text" id="patientId" required placeholder="e.g., 1001">
                </div>
                <div class="form-group">
                    <label for="patientName">Patient Name *</label>
                    <input type="text" id="patientName" required placeholder="Full Name">
                </div>
            </div>
            
            <div class="form-row" style="margin-top: 12px;">
                <div class="form-group">
                    <label for="patientAge">Age</label>
                    <input type="number" id="patientAge" min="0" placeholder="Years">
                </div>
                <div class="form-group">
                    <label for="patientSex">Sex</label>
                    <select id="patientSex">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="patientWeight">Weight (kg)</label>
                    <input type="number" id="patientWeight" min="0" step="0.1" placeholder="kg">
                </div>
                <div class="form-group">
                    <label for="visitDate">Visit Date</label>
                    <input type="date" id="visitDate" required>
                </div>
            </div>

            <div class="section-title">Clinical Evaluation History</div>
            <div class="grid-2x2">
                <div class="form-group">
                    <label for="historyCC">1. C/C (Chief Complaints)</label>
                    <textarea id="historyCC" placeholder="Symptoms, duration..." oninput="autoExpand(this)"></textarea>
                </div>
                <div class="form-group">
                    <label for="historyOE">2. O/E (On Examination)</label>
                    <textarea id="historyOE" placeholder="BP, Pulse, Vitals..." oninput="autoExpand(this)"></textarea>
                </div>
                <div class="form-group">
                    <label for="historyPD">3. P/D (Provisional Diagnosis)</label>
                    <textarea id="historyPD" placeholder="Clinical pathways..." oninput="autoExpand(this)"></textarea>
                </div>
                <div class="form-group">
                    <label for="historyOther">4. Other Clinical Notes</label>
                    <textarea id="historyOther" placeholder="Allergies, chronic medical baseline..." oninput="autoExpand(this)"></textarea>
                </div>
            </div>

            <div class="section-title">Prescribed Investigations (Tests Done)</div>
            <div id="testListsContainer"></div>
            <div class="form-row">
                <div class="form-group">
                    <label>Test Name</label>
                    <input type="text" id="testInput" list="pastTests" placeholder="e.g., CBC">
                    <datalist id="pastTests"></datalist>
                </div>
                <div class="form-group">
                    <label>Value</label>
                    <input type="text" id="testValueInput" placeholder="e.g., 12.5">
                </div>
                <div class="form-group">
                    <label>Unit</label>
                    <input type="text" id="testUnitInput" placeholder="e.g., g/dL">
                </div>
            </div>
            <button type="button" class="btn-secondary" style="margin-top: 10px; width: 100%;" onclick="addTestToArray()">+ Add Test</button>

            <div class="section-title">Medication & Prescription Matrix</div>
            <div id="medListsContainer"></div>
            
            <div style="background: rgba(100, 116, 139, 0.15); padding: 15px; border-radius: 8px; border: 2px solid var(--border);">
                <div class="form-row">
                    <div class="form-group">
                        <label for="medInput">Medication / Syrup Name</label>
                        <input type="text" id="medInput" list="pastMeds" placeholder="Type name...">
                        <datalist id="pastMeds"></datalist>
                    </div>
                    <div class="form-group">
                        <label for="medUnit">Dose Unit</label>
                        <select id="medUnit">
                            <option value="tabs">Tablet(s)</option>
                            <option value="caps">Capsule(s)</option>
                            <option value="tsp">Teaspoon (tsp)</option>
                            <option value="mL">mL</option>
                            <option value="mg">mg</option>
                            <option value="drops">Drop(s)</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 12px;">
                    <label>Treatment Duration Protocol</label>
                    <div class="toggle-row">
                        <input type="radio" id="durOngoing" name="medDurationType" value="ongoing" checked onclick="toggleDurationInputs()">
                        <label for="durOngoing">Ongoing</label>
                        <input type="radio" id="durFixed" name="medDurationType" value="fixed" onclick="toggleDurationInputs()">
                        <label for="durFixed">Fixed Period</label>
                    </div>
                </div>
                <div class="form-row" id="fixedDurationRow" style="display: none; gap: 10px;">
                    <div class="form-group"><input type="number" id="medDurationCount" min="1" placeholder="Count"></div>
                    <div class="form-group">
                        <select id="medDurationUnit">
                            <option value="Days">Days</option>
                            <option value="Weeks">Weeks</option>
                            <option value="Months">Months</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 12px;">
                    <label>Dosing Strategy Setup:</label>
                    <div class="toggle-row">
                        <input type="radio" id="typeStandard" name="scheduleType" value="standard" checked onclick="toggleDoseInputs()">
                        <label for="typeStandard">Standard Meal Matrix</label>
                        <input type="radio" id="typeCustom" name="scheduleType" value="custom" onclick="toggleDoseInputs()">
                        <label for="typeCustom">Custom Schedule</label>
                    </div>
                </div>

                <div class="dosage-container" id="standardDoseBlock">
                    <div class="meal-timing">
                        <div class="meal-title">Before Meal</div>
                        <div class="dosage-grid">
                            <div class="dosage-box"><span>Morning</span><input type="number" id="bm_morning" min="0" step="0.5" placeholder="0"></div>
                            <div class="dosage-box"><span>Noon</span><input type="number" id="bm_noon" min="0" step="0.5" placeholder="0"></div>
                            <div class="dosage-box"><span>Dinner</span><input type="number" id="bm_dinner" min="0" step="0.5" placeholder="0"></div>
                        </div>
                    </div>
                    <div class="meal-timing">
                        <div class="meal-title">After Meal</div>
                        <div class="dosage-grid">
                            <div class="dosage-box"><span>Morning</span><input type="number" id="am_morning" min="0" step="0.5" placeholder="0"></div>
                            <div class="dosage-box"><span>Noon</span><input type="number" id="am_noon" min="0" step="0.5" placeholder="0"></div>
                            <div class="dosage-box"><span>Dinner</span><input type="number" id="am_dinner" min="0" step="0.5" placeholder="0"></div>
                        </div>
                    </div>
                </div>

                <div class="dosage-container" id="customDoseBlock" style="display: none;">
                    <div class="form-row">
                        <div class="form-group"><input type="number" id="customQty" min="0" step="0.5" placeholder="Qty"></div>
                        <div class="form-group"><input type="text" id="customFrequency" placeholder="e.g., Every 8 hours"></div>
                    </div>
                </div>
                <button type="button" class="btn-secondary" style="margin-top: 15px; width: 100%;" onclick="addMedicationToArray()">+ Add Medication</button>
            </div>

            <div class="section-title">Patient Management & Follow-up Directions</div>
            <div class="form-group">
                <label>Dietary Advice / Prohibitions / Suggestions</label>
                <textarea id="patientAdvice" placeholder="Lifestyle modifications..." oninput="autoExpand(this)"></textarea>
            </div>

            <div class="form-group">
                <label for="nextVisitDate">Next Review Return Date</label>
                <input type="date" id="nextVisitDate">
            </div>

            <div class="form-group" style="background: rgba(234, 179, 8, 0.15); padding: 15px; border-radius: 8px; border: 2px solid var(--border);">
                <label style="color: var(--primary);">🔬 Tests Required for Next Review (Dropdown Auto-complete)</label>
                <div class="form-row">
                    <div class="form-group">
                        <input type="text" id="futureTestInput" list="pastFutureTests" placeholder="Type diagnostic test requested...">
                        <datalist id="pastFutureTests"></datalist>
                    </div>
                </div>
                <button type="button" class="btn-primary" style="margin-top: 10px; width: 100%;" onclick="addFutureTestToArray()">+ Add Future Test</button>
                <div id="futureTestsContainer" style="margin-top: 10px;"></div>
            </div>

            <button type="submit" class="btn-primary" id="saveBtn" style="margin-top: 25px; width: 100%;">💾 Save Record</button>
        </form>
    </div>

    <script>
        let appData = { patients: {}, globalTests: [], globalMeds: [], globalFutureTests: [] };
        let currentVisitTests = [];
        let currentVisitMeds = [];
        let currentFutureTests = [];
        let myChartInstance = null;

        window.onload = function() {
            if (localStorage.getItem('clinicalAppV14')) {
                appData = JSON.parse(localStorage.getItem('clinicalAppV14'));
            }
            document.getElementById('visitDate').valueAsDate = new Date();
            
            document.getElementById('searchPatient').addEventListener('input', function(e) {
                handleSearchSelection(e.target.value);
            });
            refreshGlobalDatalists();
        };

        // Standardized print call execution for web views
        function triggerNativePrint() {
            window.print();
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const targetTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', targetTheme);
            if(myChartInstance) updateAnalyticsChart();
        }

        function saveToStorage() {
            localStorage.setItem('clinicalAppV14', JSON.stringify(appData));
            refreshGlobalDatalists();
        }

        function autoExpand(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function refreshGlobalDatalists() {
            const patientDatalist = document.getElementById('pastPatients');
            const testDatalist = document.getElementById('pastTests');
            const medDatalist = document.getElementById('pastMeds');
            const futureTestDatalist = document.getElementById('pastFutureTests');

            patientDatalist.innerHTML = ''; testDatalist.innerHTML = ''; medDatalist.innerHTML = ''; futureTestDatalist.innerHTML = '';

            Object.keys(appData.patients).forEach(id => {
                let option = document.createElement('option');
                option.value = `ID:${id} | ${appData.patients[id].name}`;
                patientDatalist.appendChild(option);
            });
            (appData.globalTests || []).forEach(t => { let o = document.createElement('option'); o.value = t; testDatalist.appendChild(o); });
            (appData.globalMeds || []).forEach(m => { let o = document.createElement('option'); o.value = m; medDatalist.appendChild(o); });
            (appData.globalFutureTests || []).forEach(f => { let o = document.createElement('option'); o.value = f; futureTestDatalist.appendChild(o); });
        }

        function toggleDoseInputs() {
            const isStandard = document.getElementById('typeStandard').checked;
            document.getElementById('standardDoseBlock').style.display = isStandard ? 'block' : 'none';
            document.getElementById('customDoseBlock').style.display = isStandard ? 'none' : 'block';
        }

        function toggleDurationInputs() {
            const isFixed = document.getElementById('durFixed').checked;
            document.getElementById('fixedDurationRow').style.display = isFixed ? 'flex' : 'none';
        }

        function handleSearchSelection(val) {
            if (!val) return;
            let targetId = "";
            if(val.includes("ID:")) {
                targetId = val.split("|")[0].replace("ID:", "").trim();
            } else {
                targetId = Object.keys(appData.patients).find(id => appData.patients[id].name.toLowerCase() === val.trim().toLowerCase());
            }
            if (targetId && appData.patients[targetId]) loadPatientProfile(targetId);
        }

        function loadPatientProfile(id) {
            const patient = appData.patients[id];
            document.getElementById('patientId').value = id;
            document.getElementById('patientId').readOnly = true;
            document.getElementById('patientName').value = patient.name;
            document.getElementById('patientAge').value = patient.age || '';
            document.getElementById('patientSex').value = patient.sex || '';
            document.getElementById('patientWeight').value = patient.weight || '';
            document.getElementById('deletePatientBtn').style.display = 'inline-block';
            document.getElementById('printBtn').style.display = 'inline-block';
            
            renderTimeline(id);
            initAnalyticsDropdown(id);
        }

        function initAnalyticsDropdown(id) {
            const selector = document.getElementById('chartTestSelector');
            const section = document.getElementById('analyticsSection');
            selector.innerHTML = '<option value="">-- Choose Test Metrics Parameter --</option>';
            
            let uniqueTests = [];
            appData.patients[id].visits.forEach(v => {
                v.tests.forEach(t => { if(t.val && !uniqueTests.includes(t.name)) uniqueTests.push(t.name); });
            });

            if(uniqueTests.length > 0) {
                section.style.display = 'block';
                uniqueTests.forEach(t => {
                    let o = document.createElement('option'); o.value = t; o.innerText = t; selector.appendChild(o);
                });
            } else {
                section.style.display = 'none';
            }
        }

        function updateAnalyticsChart() {
            const testName = document.getElementById('chartTestSelector').value;
            const id = document.getElementById('patientId').value;
            if(!testName || !id) return;

            let dataTimeline = appData.patients[id].visits
                .filter(v => v.tests.some(t => t.name === testName && !isNaN(parseFloat(t.val))))
                .sort((a,b) => new Date(a.date) - new Date(b.date));

            let labels = dataTimeline.map(v => v.date);
            let datasetPoints = dataTimeline.map(v => parseFloat(v.tests.find(t => t.name === testName).val));
            let unitLabel = dataTimeline[0] ? dataTimeline[0].tests.find(t => t.name === testName).unit : '';

            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const colorAxis = isDark ? '#f8fafc' : '#0f172a';

            if(myChartInstance) myChartInstance.destroy();

            const ctx = document.getElementById('analyticsChart').getContext('2d');
            myChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `${testName} (${unitLabel})`,
                        data: datasetPoints,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 3,
                        tension: 0.2,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: colorAxis } } },
                    scales: {
                        x: { ticks: { color: colorAxis }, grid: { color: isDark ? '#334155' : '#border' } },
                        y: { ticks: { color: colorAxis }, grid: { color: isDark ? '#334155' : '#border' } }
                    }
                }
            });
        }

        function addTestToArray() {
            const name = document.getElementById('testInput').value.trim();
            const val = document.getElementById('testValueInput').value.trim();
            const unit = document.getElementById('testUnitInput').value.trim();
            if(name) {
                currentVisitTests.push({ name, val, unit });
                document.getElementById('testInput').value = ''; document.getElementById('testValueInput').value = ''; document.getElementById('testUnitInput').value = '';
                renderLocalItems();
            }
        }

        function addMedicationToArray() {
            const name = document.getElementById('medInput').value.trim();
            const unit = document.getElementById('medUnit').value;
            if(!name) return;

            const isStandard = document.getElementById('typeStandard').checked;
            let durationText = document.getElementById('durOngoing').checked ? "Ongoing" : `For ${document.getElementById('medDurationCount').value || 1} ${document.getElementById('medDurationUnit').value}`;

            let medObj = { name, unit, duration: durationText, type: isStandard ? 'standard' : 'custom' };
            if(isStandard) {
                medObj.bm = { morning: document.getElementById('bm_morning').value || 0, noon: document.getElementById('bm_noon').value || 0, dinner: document.getElementById('bm_dinner').value || 0 };
                medObj.am = { morning: document.getElementById('am_morning').value || 0, noon: document.getElementById('am_noon').value || 0, dinner: document.getElementById('am_dinner').value || 0 };
            } else {
                medObj.customQty = document.getElementById('customQty').value || 1;
                medObj.customFrequency = document.getElementById('customFrequency').value.trim() || 'As directed';
            }

            currentVisitMeds.push(medObj);
            document.getElementById('medInput').value = '';
            ['bm_morning','bm_noon','bm_dinner','am_morning','am_noon','am_dinner','customQty','customFrequency','medDurationCount'].forEach(id => document.getElementById(id).value = '');
            renderLocalItems();
        }

        function addFutureTestToArray() {
            const el = document.getElementById('futureTestInput');
            if(el.value.trim()) { currentFutureTests.push(el.value.trim()); el.value = ''; renderLocalItems(); }
        }

        function removeTestFromLocal(i) { currentVisitTests.splice(i, 1); renderLocalItems(); }
        function removeMedFromLocal(i) { currentVisitMeds.splice(i, 1); renderLocalItems(); }
        function removeFutureTestFromLocal(i) { currentFutureTests.splice(i, 1); renderLocalItems(); }

        function renderLocalItems() {
            const tc = document.getElementById('testListsContainer'); tc.innerHTML = '';
            currentVisitTests.forEach((t, i) => {
                tc.innerHTML += `<div class="dynamic-item"><span>📋 <strong>${t.name}</strong> ${t.val || t.unit ? `[${t.val} ${t.unit}]` : ''}</span><button type="button" class="btn-danger btn-sm" onclick="removeTestFromLocal(${i})">❌</button></div>`;
            });

            const mc = document.getElementById('medListsContainer'); mc.innerHTML = '';
            currentVisitMeds.forEach((m, i) => {
                let dsp = m.type === 'standard' ? `Before Meal: [${m.bm.morning}-${m.bm.noon}-${m.bm.dinner}] | After Meal: [${m.am.morning}-${m.am.noon}-${m.am.dinner}]` : `Custom: ${m.customQty} ${m.unit} (${m.customFrequency})`;
                mc.innerHTML += `<div class="dynamic-item"><div><strong>💊 ${m.name}</strong> (${m.duration})<br><small style="color:var(--text-muted)">${dsp}</small></div><button type="button" class="btn-danger btn-sm" onclick="removeMedFromLocal(${i})">❌</button></div>`;
            });

            const fc = document.getElementById('futureTestsContainer'); fc.innerHTML = '';
            currentFutureTests.forEach((t, i) => {
                fc.innerHTML += `<div class="dynamic-item" style="background:var(--surface)"><span>🔬 Review Target: <strong>${t}</strong></span><button type="button" class="btn-danger btn-sm" onclick="removeFutureTestFromLocal(${i})">❌</button></div>`;
            });
        }

        function renderTimeline(id) {
            const patient = appData.patients[id];
            const timeline = document.getElementById('visitTimeline');
            const historySection = document.getElementById('historySection');
            
            timeline.innerHTML = '';
            if (patient && patient.visits.length > 0) {
                historySection.style.display = 'block';
                const sorted = [...patient.visits].sort((a,b) => new Date(b.date) - new Date(a.date));

                sorted.forEach(visit => {
                    const origIdx = patient.visits.indexOf(visit);
                    const card = document.createElement('div');
                    card.className = 'visit-card';
                    
                    let testBlock = visit.tests.map(t => `<li>${t.name}${t.val || t.unit ? `: <strong>${t.val} ${t.unit}</strong>` : ''}</li>`).join('') || 'None';
                    let medBlock = visit.medications.map(m => `<li><strong>${m.name}</strong> (${m.duration})<br><small>${m.type === 'standard' ? `Before: [${m.bm.morning}-${m.bm.noon}-${m.bm.dinner}] | After: [${m.am.morning}-${m.am.noon}-${m.am.dinner}]` : `${m.customQty} (${m.customFrequency})`}</small></li>`).join('') || 'None';
                    let futureBlock = visit.futureTests.map(t => `<li>${t}</li>`).join('') || 'None';

                    card.innerHTML = `
                        <div class="visit-header">
                            <span>📅 Date: ${visit.date}</span>
                            <button type="button" class="btn-secondary btn-sm" onclick="editVisit('${id}', ${origIdx})">Edit Visit</button>
                        </div>
                        
                        <!-- LANDSCAPE COMPRESSION ROW FOR HARD COPY PRINT MODES -->
                        <div class="print-horizontal-metrics">
                            <span><strong>Patient ID:</strong> ${id}</span>
                            <span><strong>Name:</strong> ${patient.name}</span>
                            <span><strong>Age/Sex:</strong> ${patient.age || 'N/A'} Yrs / ${patient.sex || 'N/A'}</span>
                            <span><strong>Weight:</strong> ${patient.weight || 'N/A'} kg</span>
                        </div>
                        
                        <div style="font-size:0.92rem; line-height:1.4; margin-bottom:10px;">
                            <strong>C/C:</strong> ${visit.cc || 'N/A'} | <strong>O/E:</strong> ${visit.oe || 'N/A'} | <strong>P/D:</strong> ${visit.pd || 'N/A'}
                        </div>
                        <p><strong>Tests Performed:</strong></p><ul>${testBlock}</ul>
                        <p style="margin-top:5px;"><strong>Prescribed Medications:</strong></p><ul>${medBlock}</ul>
                        <p style="margin-top:5px;"><strong>Dietary Advice / Remarks:</strong> ${visit.advice || 'None'}</p>
                        <p style="margin-top:5px; color:var(--primary)"><strong>Next Review Return Date:</strong> ${visit.nextVisitDate || 'SOS'}</p>
                        <ul>${futureBlock}</ul>
                    `;
                    timeline.appendChild(card);
                });
            } else {
                historySection.style.display = 'none';
            }
        }

        function editVisit(id, index) {
            const v = appData.patients[id].visits[index];
            document.getElementById('formHeader').innerText = `Editing Entry - ID: ${id}`;
            document.getElementById('patientId').value = id;
            document.getElementById('patientId').readOnly = true;
            document.getElementById('patientName').value = appData.patients[id].name;
            document.getElementById('patientAge').value = appData.patients[id].age;
            document.getElementById('patientSex').value = appData.patients[id].sex || '';
            document.getElementById('patientWeight').value = appData.patients[id].weight || '';
            document.getElementById('visitDate').value = v.date;
            
            document.getElementById('historyCC').value = v.cc || '';
            document.getElementById('historyOE').value = v.oe || '';
            document.getElementById('historyPD').value = v.pd || '';
            document.getElementById('historyOther').value = v.otherNotes || '';
            document.getElementById('patientAdvice').value = v.advice || '';
            document.getElementById('nextVisitDate').value = v.nextVisitDate || '';
            
            currentVisitTests = v.tests || [];
            currentVisitMeds = v.medications || [];
            currentFutureTests = v.futureTests || [];
            renderLocalItems();

            ['historyCC', 'historyOE', 'historyPD', 'historyOther', 'patientAdvice'].forEach(id => autoExpand(document.getElementById(id)));
            document.getElementById('editVisitIndex').value = index;
            document.getElementById('saveBtn').innerText = "🔄 Update Clinical Record";
            window.scrollTo({ top: document.getElementById('formHeader').offsetTop, behavior: 'smooth' });
        }

        function deleteEntirePatient() {
            const id = document.getElementById('patientId').value.trim();
            if(id && confirm(`Delete profile history ledger for ID: ${id}?`)) {
                delete appData.patients[id]; saveToStorage(); resetFormToNew();
            }
        }

        function savePatientRecord(e) {
            e.preventDefault();
            const id = document.getElementById('patientId').value.trim();
            const name = document.getElementById('patientName').value.trim();
            const editIndexVal = document.getElementById('editVisitIndex').value;

            if (!appData.patients[id]) appData.patients[id] = { visits: [] };
            appData.patients[id].name = name;
            appData.patients[id].age = document.getElementById('patientAge').value;
            appData.patients[id].sex = document.getElementById('patientSex').value;
            appData.patients[id].weight = document.getElementById('patientWeight').value;

            const visitObj = {
                date: document.getElementById('visitDate').value,
                cc: document.getElementById('historyCC').value,
                oe: document.getElementById('historyOE').value,
                pd: document.getElementById('historyPD').value,
                otherNotes: document.getElementById('historyOther').value,
                advice: document.getElementById('patientAdvice').value,
                nextVisitDate: document.getElementById('nextVisitDate').value,
                tests: [...currentVisitTests], medications: [...currentVisitMeds], futureTests: [...currentFutureTests]
            };

            if (editIndexVal !== "") appData.patients[id].visits[parseInt(editIndexVal)] = visitObj;
            else appData.patients[id].visits.push(visitObj);

            if(!appData.globalTests) appData.globalTests = [];
            if(!appData.globalMeds) appData.globalMeds = [];
            if(!appData.globalFutureTests) appData.globalFutureTests = [];

            currentVisitTests.forEach(t => { if(!appData.globalTests.includes(t.name)) appData.globalTests.push(t.name); });
            currentVisitMeds.forEach(m => { if(!appData.globalMeds.includes(m.name)) appData.globalMeds.push(m.name); });
            currentFutureTests.forEach(f => { if(!appData.globalFutureTests.includes(f)) appData.globalFutureTests.push(f); });

            saveToStorage(); resetFormToNew(); loadPatientProfile(id);
        }

        function resetFormToNew() {
            document.getElementById('clinicalForm').reset();
            document.getElementById('patientId').readOnly = false;
            document.getElementById('searchPatient').value = '';
            document.getElementById('editVisitIndex').value = "";
            document.getElementById('formHeader').innerText = "New Visit Entry";
            document.getElementById('saveBtn').innerText = "💾 Save Record";
            document.getElementById('visitDate').valueAsDate = new Date();
            document.getElementById('historySection').style.display = 'none';
            document.getElementById('analyticsSection').style.display = 'none';
            document.getElementById('deletePatientBtn').style.display = 'none';
            document.getElementById('printBtn').style.display = 'none';
            currentVisitTests = []; currentVisitMeds = []; currentFutureTests = [];
            renderLocalItems(); toggleDoseInputs(); toggleDurationInputs();
            if(myChartInstance) myChartInstance.destroy();
            ['historyCC', 'historyOE', 'historyPD', 'historyOther', 'patientAdvice'].forEach(id => document.getElementById(id).style.height = 'auto');
        }
    </script>
</body>
</html>
